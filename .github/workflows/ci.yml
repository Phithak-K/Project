name: CI — Build, Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint (ESLint)
        run: npm run lint -- --max-warnings=0

      - name: 🔨 Build (TypeScript compile check)
        run: npm run build

      - name: 🧪 Unit Tests (Jest)
        run: npm run test -- --passWithNoTests
        env:
          # ค่า placeholder สำหรับ CI — ไม่ได้เชื่อม DB จริง (unit test ใช้ mock)
          JWT_SECRET: ci-test-secret-placeholder
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          ADMIN_EMAILS: admin@test.com

  frontend-ci:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint (ESLint)
        run: npm run lint -- --max-warnings=0

      - name: 🔨 Build (Next.js type-check + build)
        run: npm run build
        env:
          # ค่า placeholder สำหรับ CI build
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_BASE_DOMAIN: localhost:3000
